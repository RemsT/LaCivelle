<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capbreton - La Civelle - Gure Kabanoia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <span class="header-icon">🏖️</span>
      <div class="header-text">
        <h1 class="site-title">La Civelle</h1>
        <p class="site-subtitle">Gure Kabanoia</p>
      </div>
    </div>
    <div class="wave-divider">
      <svg viewBox="0 0 1200 60" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,30 C200,60 400,0 600,30 C800,60 1000,0 1200,30 L1200,60 L0,60 Z" fill="#f5e6c8"/>
      </svg>
    </div>
  </header>

  <!-- TAB NAV -->
  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" role="tab" aria-selected="true"
            aria-controls="panel-calendar" id="tab-calendar"
            onclick="switchTab('calendar')">
      📅 Séjours
    </button>
    <button class="tab-btn" role="tab" aria-selected="false"
            aria-controls="panel-arrival" id="tab-arrival"
            onclick="switchTab('arrival')">
      🏠 Arrivée
    </button>
    <button class="tab-btn" role="tab" aria-selected="false"
            aria-controls="panel-checkout" id="tab-checkout"
            onclick="switchTab('checkout')">
      ✅ Départ
    </button>
  </nav>

  <main class="main-content">

    <!-- ======= ONGLET SÉJOURS ======= -->
    <div id="panel-calendar" class="tab-panel active" role="tabpanel" aria-labelledby="tab-calendar">
      <p class="calendar-tip">Appuyez sur un jour ou sur + pour ajouter un séjour</p>
      <div id="fullcalendar"></div>
    </div>

    <!-- ======= ONGLET ARRIVÉE ======= -->
    <div id="panel-arrival" class="tab-panel" role="tabpanel" aria-labelledby="tab-arrival">
      <div id="arrival-content" class="arrival-content"></div>
      <div class="reset-area">
        <button class="btn-reset" onclick="resetArrival()">🔄 Tout réinitialiser</button>
      </div>
    </div>

    <!-- ======= ONGLET CHECK-OUT ======= -->
    <div id="panel-checkout" class="tab-panel" role="tabpanel" aria-labelledby="tab-checkout">

      <div class="progress-header">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span class="progress-label" id="progress-label">0 / 28 tâches</span>
          <span class="progress-step-label" id="progress-step-label">Étape 1 / 6</span>
        </div>
        <div class="step-indicators" id="step-indicators" role="navigation" aria-label="Étapes"></div>
      </div>

      <div id="step-content" class="step-content"></div>

      <div class="nav-buttons" id="nav-buttons">
        <button class="btn-nav btn-prev" id="btn-prev" onclick="goPrev()">← Précédent</button>
        <button class="btn-nav btn-next" id="btn-next" onclick="goNext()">Suivant →</button>
      </div>

      <div class="reset-area">
        <button class="btn-reset" onclick="resetChecklist()">🔄 Tout réinitialiser</button>
      </div>

    </div>

  </main>

  <!-- MODALE AJOUT SÉJOUR -->
  <div id="event-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-content">
      <h3 id="modal-title">🏖️ Nouveau séjour</h3>
      <div class="modal-field">
        <label for="person-select">Qui ?</label>
        <div class="person-select-row">
          <span id="person-dot" class="person-dot"></span>
          <select id="person-select" class="person-select-input" onchange="onPersonChange()"></select>
        </div>
        <!-- Formulaire "Autre personne" -->
        <div id="other-form" class="other-form hidden">
          <input id="other-name" type="text" placeholder="Prénom ou nom" autocomplete="off" class="other-name-input">
          <div style="margin-top:10px">
            <label style="font-size:0.82rem;font-weight:700;color:#6b8599;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Couleur</label>
            <div class="color-picker" id="other-color-picker"></div>
          </div>
        </div>
      </div>
      <div class="modal-field modal-dates">
        <div>
          <label for="ev-start">Du</label>
          <input id="ev-start" type="date">
        </div>
        <div>
          <label for="ev-end">Au</label>
          <input id="ev-end" type="date">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-save" onclick="saveEvent()">Enregistrer</button>
        <button class="btn-modal-cancel" onclick="closeEventModal()">Annuler</button>
      </div>
    </div>
  </div>
  <div id="modal-overlay" class="modal-overlay hidden" onclick="closeEventModal()"></div>

  <!-- MODALE ÉDITION ÉVÉNEMENT -->
  <div id="detail-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="detail-modal-title">
    <div class="modal-content">
      <h3 id="detail-modal-title">✏️ Modifier le séjour</h3>
      <div class="modal-field">
        <label for="edit-person-select">Qui ?</label>
        <div class="person-select-row">
          <span id="edit-person-dot" class="person-dot"></span>
          <select id="edit-person-select" class="person-select-input" onchange="onEditPersonChange()"></select>
        </div>
        <div id="edit-other-form" class="other-form hidden">
          <input id="edit-other-name" type="text" placeholder="Prénom ou nom" autocomplete="off" class="other-name-input">
          <div style="margin-top:10px">
            <label style="font-size:0.82rem;font-weight:700;color:#6b8599;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:6px">Couleur</label>
            <div class="color-picker" id="edit-other-color-picker"></div>
          </div>
        </div>
      </div>
      <div class="modal-field modal-dates">
        <div>
          <label for="edit-start">Du</label>
          <input id="edit-start" type="date">
        </div>
        <div>
          <label for="edit-end">Au</label>
          <input id="edit-end" type="date">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-modal-save" onclick="updateEvent()">💾 Enregistrer</button>
        <button class="btn-modal-delete" onclick="deleteEvent()">🗑 Supprimer</button>
        <button class="btn-modal-cancel" onclick="closeDetailModal()">Annuler</button>
      </div>
    </div>
  </div>
  <div id="detail-overlay" class="modal-overlay hidden" onclick="closeDetailModal()"></div>

  <!-- BOUTON FLOTTANT AJOUT SÉJOUR (affiché uniquement sur l'onglet calendrier) -->
  <button id="fab-add" class="fab-add" onclick="openEventModalToday()" aria-label="Ajouter un séjour">+</button>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fermer">✕</button>
    <img id="lightbox-img" src="" alt="Photo agrandie">
  </div>

  <!-- ÉCRAN DE FIN -->
  <div id="finish-screen" class="finish-screen hidden">
    <div class="finish-inner">
      <div class="finish-icon">🏖️</div>
      <h2>Tout est en ordre !</h2>
      <p>Bon voyage et à bientôt à Capbreton !</p>
      <button class="btn-finish-reset" onclick="resetChecklist()">🔄 Nouvelle checklist</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/fr.global.min.js"></script>
  <script src="checklist-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
